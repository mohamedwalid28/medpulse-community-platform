version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: medpulse
      POSTGRES_PASSWORD: password
  
  backend:
    build: ./backend-core
    env_file: .env
    depends_on:
      - db

  automation:
    build: ./automation-engine
    ports:
      - "8001:8001"